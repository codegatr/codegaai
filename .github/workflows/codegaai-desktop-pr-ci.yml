name: CODEGA AI Desktop PR Verification

on:
  pull_request:
    paths:
      - "apps/codegaai-desktop/**"
      - "AGENTS.md"
      - "CODEGA_CORE.md"
      - "CODEGA_RULES.md"
      - "CODEGA_SKILLS/**"
      - ".github/workflows/codegaai-desktop-pr-ci.yml"

permissions:
  contents: read

jobs:
  verify:
    name: Test desktop agent changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/codegaai-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/codegaai-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run verification suite
        run: npm run test:ci
