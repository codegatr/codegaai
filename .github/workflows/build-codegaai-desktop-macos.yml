name: CODEGA AI Desktop macOS

on:
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - "apps/codegaai-desktop/**"
      - ".github/workflows/build-codegaai-desktop-macos.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop surumu (orn. 2.3.28). Bos birakilirsa package.json kullanilir."
        required: false
        type: string
      publish_release:
        description: "GitHub Release ve updater metadata yayinla"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-desktop-macos:
    name: Build CODEGA AI macOS app
    runs-on: macos-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: apps/codegaai-desktop
    env:
      CSC_LINK: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/codegaai-desktop/package-lock.json

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ] && [[ "$GITHUB_REF" == refs/tags/desktop-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid desktop version: $VERSION"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=desktop-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Verification-first test suite
        run: npm run test:ci

      - name: Detect Apple release credentials
        id: apple_credentials
        shell: bash
        run: |
          missing=()
          [[ -n "$CSC_LINK" ]] || missing+=("APPLE_DEVELOPER_ID_CERTIFICATE_BASE64")
          [[ -n "$CSC_KEY_PASSWORD" ]] || missing+=("APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD")
          [[ -n "$APPLE_ID" ]] || missing+=("APPLE_NOTARIZATION_APPLE_ID")
          [[ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]] || missing+=("APPLE_NOTARIZATION_PASSWORD")
          [[ -n "$APPLE_TEAM_ID" ]] || missing+=("APPLE_NOTARIZATION_TEAM_ID")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Actions secrets: %s\n' "${missing[*]}"
            echo "Apple signing/notarization will be skipped; building unsigned fallback artifacts."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "Apple signing/notarization credentials are available."
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed macOS app
        if: steps.apple_credentials.outputs.available == 'true'
        run: npm run dist:mac

      - name: Build unsigned macOS app
        if: steps.apple_credentials.outputs.available != 'true'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run dist:mac

      - name: Verify Developer ID signature
        if: steps.apple_credentials.outputs.available == 'true'
        shell: bash
        run: |
          found=0
          while IFS= read -r -d '' app; do
            found=1
            codesign --verify --deep --strict --verbose=2 "$app"
            identity="$(codesign -dv --verbose=4 "$app" 2>&1 | sed -n 's/^Authority=//p' | head -1)"
            if [[ "$identity" != Developer\ ID\ Application:* ]]; then
              echo "Unexpected signing identity for $app: $identity"
              exit 1
            fi
          done < <(find release -type d -name "CODEGA AI.app" -print0)
          if [[ "$found" -ne 1 ]]; then
            echo "No signed CODEGA AI.app bundle was produced."
            exit 1
          fi

      - name: Notarize and staple macOS disk images
        if: steps.apple_credentials.outputs.available == 'true'
        shell: bash
        run: |
          shopt -s nullglob
          dmgs=(release/*.dmg)
          if (( ${#dmgs[@]} == 0 )); then
            echo "No DMG files were produced."
            exit 1
          fi
          for dmg in "${dmgs[@]}"; do
            echo "Submitting $dmg for Apple notarization..."
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done

      - name: Verify Gatekeeper acceptance
        if: steps.apple_credentials.outputs.available == 'true'
        shell: bash
        run: |
          shopt -s nullglob
          for dmg in release/*.dmg; do
            spctl --assess --type open --context context:primary-signature --verbose=2 "$dmg"
          done

      - name: Verify unsigned macOS artifact
        if: steps.apple_credentials.outputs.available != 'true'
        shell: bash
        run: |
          shopt -s nullglob
          artifacts=(release/*.dmg release/*.zip)
          if (( ${#artifacts[@]} == 0 )); then
            echo "No unsigned macOS artifacts were produced."
            exit 1
          fi
          printf 'Unsigned macOS artifact produced: %s\n' "${artifacts[@]}"

      - name: Verify updater metadata
        shell: bash
        run: |
          if [ ! -f "release/latest-mac.yml" ]; then
            echo "release/latest-mac.yml was not produced."
            exit 1
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: codegaai-desktop-macos-${{ steps.release.outputs.version }}
          path: |
            apps/codegaai-desktop/release/*.dmg
            apps/codegaai-desktop/release/*.zip
            apps/codegaai-desktop/release/latest-mac.yml

      - name: Attach to GitHub Release
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/desktop-v') || inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: CODEGA AI Desktop ${{ steps.release.outputs.version }}
          files: |
            apps/codegaai-desktop/release/*.dmg
            apps/codegaai-desktop/release/*.zip
            apps/codegaai-desktop/release/latest-mac.yml
