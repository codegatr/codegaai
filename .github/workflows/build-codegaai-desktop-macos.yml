name: CODEGA AI Desktop macOS

on:
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - "apps/codegaai-desktop/**"
      - ".github/workflows/build-codegaai-desktop-macos.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop sürümü (örn. 0.5.0). Boş bırakılırsa package.json kullanılır."
        required: false
        type: string
      publish_release:
        description: "GitHub Release ve updater metadata yayınla"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-desktop-macos:
    name: Build CODEGA AI macOS app
    runs-on: macos-latest
    timeout-minutes: 40
    defaults:
      run:
        working-directory: apps/codegaai-desktop
    env:
      # Apple sertifikası yok -> imzalama denemesini kapat (CI başarısız olmasın).
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/codegaai-desktop/package-lock.json

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ] && [[ "$GITHUB_REF" == refs/tags/desktop-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/desktop-v}"
          fi
          if [ -z "$VERSION" ]; then
            VERSION="$(node -p "require('./package.json').version")"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid desktop version: $VERSION"; exit 1
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=desktop-v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm ci

      - name: Static scaffold check
        run: npm run check

      - name: Build macOS app (dmg + zip, unsigned)
        run: npm run dist:mac

      - name: Verify updater metadata
        shell: bash
        run: |
          if [ ! -f "release/latest-mac.yml" ]; then
            echo "release/latest-mac.yml üretilmedi; electron-updater bu derlemeyi göremez."
            exit 1
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: codegaai-desktop-macos-${{ steps.release.outputs.version }}
          path: |
            apps/codegaai-desktop/release/*.dmg
            apps/codegaai-desktop/release/*.zip
            apps/codegaai-desktop/release/latest-mac.yml

      - name: Attach to GitHub Release
        if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/desktop-v') || inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: CODEGA AI Desktop ${{ steps.release.outputs.version }}
          files: |
            apps/codegaai-desktop/release/*.dmg
            apps/codegaai-desktop/release/*.zip
            apps/codegaai-desktop/release/latest-mac.yml
