name: CODEGA AI Desktop Windows

on:
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - "apps/codegaai-desktop/**"
      - ".github/workflows/build-codegaai-desktop-windows.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop-windows:
    name: Build CODEGA AI Windows installer
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/codegaai-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/codegaai-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Static scaffold check
        run: npm run check

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: codegaai-desktop-windows
          path: apps/codegaai-desktop/release/*

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: apps/codegaai-desktop/release/*
