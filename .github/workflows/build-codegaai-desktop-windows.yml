name: CODEGA AI Desktop Windows

on:
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - "apps/codegaai-desktop/**"
      - ".github/workflows/build-codegaai-desktop-windows.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop sürümü (örn. 0.1.3). Boş bırakılırsa package.json kullanılır."
        required: false
        type: string
      publish_release:
        description: "GitHub Release ve updater metadata yayınla"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-desktop-windows:
    name: Build CODEGA AI Windows installer
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/codegaai-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/codegaai-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          $version = "${{ inputs.version }}"
          if (-not $version -and $env:GITHUB_REF -like "refs/tags/desktop-v*") {
            $version = $env:GITHUB_REF -replace "^refs/tags/desktop-v", ""
          }
          if ($version) {
            if ($version -notmatch "^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$") {
              throw "Invalid desktop version: $version"
            }
            npm version $version --no-git-tag-version
          } else {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $version = $pkg.version
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=desktop-v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Static scaffold check
        run: npm run check

      - name: Build Windows installer
        run: npm run dist:win

      - name: Verify updater metadata
        shell: pwsh
        run: |
          if (-not (Test-Path "release/latest.yml")) {
            throw "release/latest.yml was not generated; electron-updater cannot discover this build."
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: codegaai-desktop-windows-${{ steps.release.outputs.version }}
          path: apps/codegaai-desktop/release/*

      - name: Attach to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/desktop-v') || inputs.publish_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: CODEGA AI Desktop ${{ steps.release.outputs.version }}
          files: apps/codegaai-desktop/release/*
