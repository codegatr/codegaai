name: CODEGA AI Desktop Windows

on:
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - "apps/codegaai-desktop/**"
      - ".github/workflows/build-codegaai-desktop-windows.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Desktop sürümü (örn. 0.1.3). Boş bırakılırsa package.json kullanılır."
        required: false
        type: string
      publish_release:
        description: "GitHub Release ve updater metadata yayınla"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-desktop-windows:
    name: Build CODEGA AI Windows installer
    runs-on: windows-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/codegaai-desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/codegaai-desktop/package-lock.json

      - name: Resolve release version
        id: release
        shell: pwsh
        run: |
          $versionInput = "${{ inputs.version }}".Trim()
          if (-not $versionInput -and $env:GITHUB_REF -like "refs/tags/desktop-v*") {
            $versionInput = $env:GITHUB_REF -replace "^refs/tags/desktop-v", ""
          }
          if ($versionInput) {
            $match = [regex]::Match($versionInput, "\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?")
            if (-not $match.Success) {
              throw "Invalid desktop version: $versionInput"
            }
            $version = $match.Value
          } else {
            $pkg = Get-Content package.json -Raw | ConvertFrom-Json
            $version = "$($pkg.version)".Trim()
          }
          if ($version -notmatch "^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$") {
            throw "Invalid desktop version: $version"
          }
          Write-Host "Resolved desktop version: $version"
          npm version $version --no-git-tag-version --allow-same-version
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=desktop-v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install dependencies
        run: npm ci

      - name: Static scaffold + syntax check + tests
        run: npm run test:ci

      - name: Build Windows installer
        env:
          CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: npm run dist:win

      - name: Generate release checksums
        shell: pwsh
        run: |
          Get-ChildItem release -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } | Set-Content -Encoding ascii release/SHA256SUMS.txt

      - name: Verify signing when certificate secret is configured
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter "*.exe" | Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer was not generated."
          }
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ($env:CSC_LINK -and $signature.Status -ne "Valid") {
            throw "Signing secret was provided but installer signature is not valid: $($signature.Status)"
          }
          if (-not $env:CSC_LINK) {
            "No signing certificate secret configured; installer is unsigned and may trigger reputation-based AV warnings." |
              Set-Content -Encoding utf8 release/UNSIGNED-BUILD-NOTICE.txt
          }

      - name: Verify updater metadata
        shell: pwsh
        run: |
          if (-not (Test-Path "release/latest.yml")) {
            throw "release/latest.yml was not generated; electron-updater cannot discover this build."
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: codegaai-desktop-windows-${{ steps.release.outputs.version }}
          path: apps/codegaai-desktop/release/*

      - name: Attach to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/desktop-v') || inputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: CODEGA AI Desktop ${{ steps.release.outputs.version }}
          files: apps/codegaai-desktop/release/*
          make_latest: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
