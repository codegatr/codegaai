name: macOS Build

on:
  push:
    branches:
      - "build/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag adı (örn. v2.3.0) - release oluşturulacak"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS Apple Silicon DMG
    runs-on: macos-15
    timeout-minutes: 60
    env:
      APP_BUNDLE: "dist/CODEGA AI.app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Print versions
        run: |
          uname -a
          uname -m
          test "$(uname -m)" = "arm64"
          python --version
          pip --version

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install pyinstaller pyinstaller-hooks-contrib

      - name: Install core deps
        run: |
          python -m pip install fastapi "uvicorn[standard]" pydantic python-multipart psutil rich httpx packaging
          python -m pip install pywebview pyobjc

      - name: Install ML deps
        run: |
          python -m pip install torch

          export CMAKE_ARGS="-DLLAMA_METAL=on"
          export FORCE_CMAKE=1
          python -m pip install llama-cpp-python --no-cache-dir
          python -c "from llama_cpp import Llama; print('llama-cpp-python macOS OK')"

          python -m pip install sentence-transformers chromadb huggingface_hub
          python -m pip install scipy scikit-learn
          python -m pip install diffusers accelerate transformers Pillow safetensors
          python -m pip install faster-whisper soundfile
          python -m pip install imageio imageio-ffmpeg

      - name: Install TTS (Coqui XTTS) [optional]
        continue-on-error: true
        run: |
          python -m pip install TTS

      - name: List installed packages
        run: pip list

      - name: Run unit tests
        continue-on-error: true
        run: |
          python -m unittest tests.test_phase2 tests.test_phase8

      - name: Build with PyInstaller
        run: |
          pyinstaller build/codegaai.spec --noconfirm --clean

      - name: Verify build output
        run: |
          test -x "dist/codegaai/codegaai"
          du -sh dist/codegaai

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="dev-$(git rev-parse --short HEAD)"
          fi
          echo "Tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create macOS app bundle
        run: |
          rm -rf "$APP_BUNDLE"
          mkdir -p "$APP_BUNDLE/Contents/MacOS"
          mkdir -p "$APP_BUNDLE/Contents/Resources"
          ditto dist/codegaai "$APP_BUNDLE/Contents/Resources/codegaai"
          cat > "$APP_BUNDLE/Contents/MacOS/CODEGA AI" <<'EOF'
          #!/bin/bash
          set -e
          APP_DIR="$(cd "$(dirname "$0")/.." && pwd)"
          exec "$APP_DIR/Resources/codegaai/codegaai"
          EOF
          chmod +x "$APP_BUNDLE/Contents/MacOS/CODEGA AI"
          cat > "$APP_BUNDLE/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>CODEGA AI</string>
            <key>CFBundleDisplayName</key>
            <string>CODEGA AI</string>
            <key>CFBundleIdentifier</key>
            <string>tr.com.codega.codegaai</string>
            <key>CFBundleVersion</key>
            <string>${{ steps.version.outputs.tag }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ steps.version.outputs.tag }}</string>
            <key>CFBundleExecutable</key>
            <string>CODEGA AI</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF
          plutil -lint "$APP_BUNDLE/Contents/Info.plist"

      - name: Import Apple signing certificate
        id: signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          if [[ -z "$CERTIFICATE_BASE64" ]]; then
            echo "No Apple Developer ID certificate secret configured; notarization will be skipped."
            echo "identity=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          identity="$(security find-identity -v -p codesigning build.keychain | awk -F '"' '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "$identity" ]]; then
            echo "Developer ID Application certificate not found"
            exit 1
          fi
          echo "identity=$identity" >> "$GITHUB_OUTPUT"

      - name: Sign macOS app bundle
        run: |
          if [[ -n "${{ steps.signing.outputs.identity }}" ]]; then
            codesign --force --deep --options runtime --timestamp \
              --sign "${{ steps.signing.outputs.identity }}" "$APP_BUNDLE"
          else
            echo "Apple Developer ID certificate secret missing; using ad-hoc signature."
            codesign --force --deep --sign - "$APP_BUNDLE"
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_BUNDLE"

      - name: Create macOS ARM64 DMG
        id: dmg
        run: |
          tag="${{ steps.version.outputs.tag }}"
          dmg_name="codegaai-$tag-macos-arm64.dmg"
          staging_dir="dist/dmg-root"

          rm -rf "$staging_dir"
          mkdir -p "$staging_dir"
          ditto "$APP_BUNDLE" "$staging_dir/CODEGA AI.app"
          ln -s /Applications "$staging_dir/Applications"

          create_dmg() {
            hdiutil create \
              -volname "CODEGA AI" \
              -srcfolder "$staging_dir" \
              -ov \
              -format UDZO \
              "$dmg_name"
          }

          create_dmg || {
            echo "DMG create failed once; cleaning stale disk image helpers and retrying..."
            hdiutil detach "/Volumes/CODEGA AI" -force || true
            pkill diskimages-helper || true
            sleep 8
            create_dmg
          }

          hdiutil verify "$dmg_name"
          if [[ -n "${{ steps.signing.outputs.identity }}" ]]; then
            codesign --force --timestamp --sign "${{ steps.signing.outputs.identity }}" "$dmg_name"
          else
            codesign --force --sign - "$dmg_name" || true
          fi
          ls -lh "$dmg_name"
          echo "dmg_name=$dmg_name" >> "$GITHUB_OUTPUT"

      - name: Notarize and staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_NOTARIZATION_APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_NOTARIZATION_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_NOTARIZATION_TEAM_ID }}
        run: |
          identity="${{ steps.signing.outputs.identity }}"
          if [[ -z "$identity" || -z "$APPLE_ID" || -z "$APPLE_PASSWORD" || -z "$APPLE_TEAM_ID" ]]; then
            echo "Apple notarization secrets are not fully configured; skipping notarization."
            exit 0
          fi
          xcrun notarytool submit "${{ steps.dmg.outputs.dmg_name }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "${{ steps.dmg.outputs.dmg_name }}"
          spctl -a -t open --context context:primary-signature -v "${{ steps.dmg.outputs.dmg_name }}"

      - name: Upload artifact (manual/build branch için)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: codegaai-macos-arm64-dmg
          path: ${{ steps.dmg.outputs.dmg_name }}
          retention-days: 30

      - name: Attach to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.dmg.outputs.dmg_name }}
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
