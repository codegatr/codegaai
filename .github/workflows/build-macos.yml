name: macOS Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag adı (örn. v2.3.0) - release oluşturulacak"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS portable
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Print versions
        run: |
          python --version
          pip --version

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install pyinstaller pyinstaller-hooks-contrib

      - name: Install core deps
        run: |
          python -m pip install fastapi "uvicorn[standard]" pydantic python-multipart psutil rich httpx packaging
          python -m pip install pywebview pyobjc

      - name: Install ML deps
        run: |
          python -m pip install torch

          export CMAKE_ARGS="-DLLAMA_METAL=on"
          export FORCE_CMAKE=1
          python -m pip install llama-cpp-python --no-cache-dir
          python -c "from llama_cpp import Llama; print('llama-cpp-python macOS OK')"

          python -m pip install sentence-transformers chromadb huggingface_hub
          python -m pip install scipy scikit-learn
          python -m pip install diffusers accelerate transformers Pillow safetensors
          python -m pip install faster-whisper soundfile
          python -m pip install imageio imageio-ffmpeg

      - name: Install TTS (Coqui XTTS) [optional]
        continue-on-error: true
        run: |
          python -m pip install TTS

      - name: List installed packages
        run: pip list

      - name: Run unit tests
        continue-on-error: true
        run: |
          python -m unittest tests.test_phase2 tests.test_phase8

      - name: Build with PyInstaller
        run: |
          pyinstaller build/codegaai.spec --noconfirm --clean

      - name: Verify build output
        run: |
          test -x "dist/codegaai/codegaai"
          du -sh dist/codegaai

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="dev-$(git rev-parse --short HEAD)"
          fi
          echo "Tag: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create portable ZIP
        id: zip
        run: |
          tag="${{ steps.version.outputs.tag }}"
          zip_name="codegaai-$tag-macos.zip"
          ditto -c -k --sequesterRsrc --keepParent dist/codegaai "$zip_name"
          ls -lh "$zip_name"
          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (workflow_dispatch için)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: codegaai-macos
          path: ${{ steps.zip.outputs.zip_name }}
          retention-days: 30

      - name: Attach to GitHub Release (tag push için)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.zip_name }}
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
