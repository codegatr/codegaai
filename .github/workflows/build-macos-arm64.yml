name: macOS Apple Silicon Build

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag adi (orn. v3.6.0 veya dev-arm64)"
        required: false
        default: ""
  push:
    tags:
      - "v*"

concurrency:
  group: macos-arm64-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-macos-arm64:
    name: Build macOS arm64 portable
    runs-on: macos-14
    timeout-minutes: 90

    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify runner architecture
        shell: bash
        run: |
          echo "Runner arch: $(uname -m)"
          if [ "$(uname -m)" != "arm64" ]; then
            echo "::warning::This runner is not arm64. The artifact may not be Apple Silicon native."
          fi

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Upgrade pip + build tools
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install pyinstaller pyinstaller-hooks-contrib

      - name: Install core deps
        shell: bash
        run: |
          python -m pip install fastapi "uvicorn[standard]" pydantic python-multipart psutil rich httpx packaging
          python -m pip install pywebview

      - name: Install PyTorch
        shell: bash
        run: |
          python -m pip install torch
          python -c "import platform, torch; print('Python arch:', platform.machine()); print('PyTorch', torch.__version__, '| MPS:', getattr(torch.backends, 'mps', None) and torch.backends.mps.is_available())"

      - name: Install llama-cpp-python
        shell: bash
        run: |
          export CMAKE_ARGS="-DLLAMA_METAL=on"
          export FORCE_CMAKE=1
          python -m pip install llama-cpp-python --no-cache-dir
          python -c "from llama_cpp import Llama; print('llama-cpp OK')"

      - name: Install ML and media deps
        shell: bash
        run: |
          python -m pip install sentence-transformers chromadb huggingface_hub
          python -m pip install scipy scikit-learn
          python -m pip install transformers diffusers accelerate Pillow safetensors
          python -m pip install faster-whisper soundfile
          python -m pip install imageio imageio-ffmpeg

      - name: Install optional deps
        shell: bash
        continue-on-error: true
        run: |
          python -m pip install peft datasets trl --no-deps
          python -m pip install einops torchvision
          python -m pip install duckduckgo-search beautifulsoup4 feedparser lxml
          python -m pip install pymupdf pdfplumber
          python -m pip install mss "qrcode[pil]"
          python -m pip install easyocr opencv-python-headless

      - name: Test imports
        shell: bash
        continue-on-error: true
        run: |
          python -c "import codegaai.api.routes.jobs; print('jobs OK')"
          python -c "import codegaai.api.routes.files; print('files OK')"
          python -c "import codegaai.api.routes.sandbox; print('sandbox OK')"
          python -c "import codegaai.api.routes.agent; print('agent OK')"
          python -c "import codegaai.core.reasoning; print('reasoning OK')"

      - name: Run smoke tests
        shell: bash
        continue-on-error: true
        run: python -m unittest tests.test_phase2 tests.test_phase8

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller build/codegaai.spec --noconfirm --clean

      - name: Verify build output
        shell: bash
        run: |
          test -x dist/codegaai/codegaai || test -f dist/codegaai/codegaai
          du -sh dist/codegaai

      - name: Determine version tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="dev-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create portable archive
        id: archive
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          archive="codegaai-${tag}-macos-arm64.tar.gz"
          tar -C dist -czf "$archive" codegaai
          echo "archive_name=$archive" >> "$GITHUB_OUTPUT"
          ls -lh "$archive"

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: codegaai-macos-arm64
          path: ${{ steps.archive.outputs.archive_name }}
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.archive.outputs.archive_name }}
          fail_on_unmatched_files: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
