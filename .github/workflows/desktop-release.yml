name: Desktop Release

on:
  # Tag yayınını build-codegaai-desktop-windows/macos workflow'ları yapar.
  # Bu eski birleşik workflow aynı Windows asset'lerini ikinci kez yükleyip
  # updater'ın elindeki imzalı GitHub URL'sini geçersiz kıldığı için yalnızca
  # manuel kurtarma amacıyla çalıştırılabilir.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/codegaai-desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Check + syntax integrity + tests
        run: npm run test:ci

      - name: Build
        run: npm run release:win

      - name: Upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/codegaai-desktop/release/*.exe
            apps/codegaai-desktop/release/*.blockmap
            apps/codegaai-desktop/release/latest.yml
