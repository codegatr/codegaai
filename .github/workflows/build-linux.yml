name: Linux Build

on:
  push:
    branches:
      - "build/**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag adi (orn. v4.6.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x64 portable
    runs-on: ubuntu-24.04
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libgtk-3-0 libwebkit2gtk-4.1-0

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install pyinstaller pyinstaller-hooks-contrib

      - name: Install Python dependencies
        run: |
          python -m pip install fastapi "uvicorn[standard]" pydantic python-multipart psutil rich httpx packaging pywebview
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          CMAKE_ARGS="-DGGML_NATIVE=OFF -DLLAMA_BLAS=OFF" FORCE_CMAKE=1 python -m pip install llama-cpp-python --no-cache-dir
          python -m pip install sentence-transformers chromadb huggingface_hub scipy scikit-learn
          python -m pip install transformers diffusers accelerate Pillow safetensors
          python -m pip install faster-whisper soundfile imageio imageio-ffmpeg
          python -m pip install duckduckgo-search beautifulsoup4 feedparser lxml pymupdf pdfplumber

      - name: Run smoke tests
        run: |
          python -m py_compile codegaai/api/server.py codegaai/api/routes/setup.py
          python -m unittest tests.test_installation_contracts tests.test_phase47_grok_minimal_home

      - name: Build with PyInstaller
        run: pyinstaller build/codegaai.spec --noconfirm --clean

      - name: Verify build output
        run: |
          test -x dist/codegaai/codegaai
          du -sh dist/codegaai

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          elif [[ -n "${{ github.event.inputs.release_tag }}" ]]; then
            tag="${{ github.event.inputs.release_tag }}"
          else
            tag="dev-$(git rev-parse --short HEAD)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Create portable archive
        id: archive
        run: |
          tag="${{ steps.version.outputs.tag }}"
          archive_name="codegaai-$tag-linux-x64.tar.gz"
          tar -czf "$archive_name" -C dist codegaai
          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: codegaai-linux-x64
          path: ${{ steps.archive.outputs.archive_name }}
          retention-days: 30

      - name: Attach to GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.archive.outputs.archive_name }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
