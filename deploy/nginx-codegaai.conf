# ============================================================
# CODEGA AI - Nginx Reverse Proxy
# ============================================================
# install.sh tarafından __DOMAIN__ replace edilir.
# certbot --nginx 80 -> 443 yönlendirme + SSL ekler.
# ============================================================

upstream codegaai_backend {
    server 127.0.0.1:8765;
    keepalive 32;
}

# HTTP — certbot tarafından HTTPS'e yönlendirme eklenir
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://codegaai_backend;
        include /etc/nginx/proxy_params;

        # Streaming endpoint'leri için
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Büyük yanıtlar için buffer'ları kapat
        proxy_buffering off;
        proxy_cache off;

        # Timeout — uzun LLM yanıtları için
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;

        # Büyük dosya yüklemeleri (görsel, ses, video upload)
        client_max_body_size 100M;

        # Real IP forward
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Statik dosyaları nginx'in cache'lemesi için
    location ~* ^/(css|js|img|outputs)/ {
        proxy_pass http://codegaai_backend;
        proxy_cache_valid 200 1h;
        expires 1h;
        add_header Cache-Control "public";
    }

    # Loglar
    access_log /var/log/nginx/codegaai-access.log;
    error_log /var/log/nginx/codegaai-error.log;

    # Güvenlik header'ları (HTTPS sonrası certbot tarafından da eklenir)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
