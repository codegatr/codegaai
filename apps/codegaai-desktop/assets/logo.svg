<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arcGrad" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#93c5fd"/>
      <stop offset="45%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Main C arc -->
  <path
    d="M 158,55 A 68,68 0 1 0 158,145"
    fill="none"
    stroke="url(#arcGrad)"
    stroke-width="22"
    stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Inner chip / dash element -->
  <rect x="90" y="93" width="24" height="6" rx="3" fill="url(#chipGrad)" opacity="0.95"/>
  <rect x="106" y="85" width="6" height="22" rx="3" fill="url(#chipGrad)" opacity="0.7"/>

  <!-- Pixel accent dots — top right -->
  <rect x="159" y="40" width="14" height="14" rx="3" fill="#60a5fa" opacity="0.95"/>
  <rect x="177" y="28" width="9"  height="9"  rx="2" fill="#93c5fd" opacity="0.75"/>
</svg>
